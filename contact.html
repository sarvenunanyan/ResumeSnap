<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CDYCGHQD8G"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — ResumeSnap.net</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0c0c0e; --surface:#141416; --card:#1a1a1e; --border:#2a2a32; --border2:#36363f; --gold:#f5c842; --gold-light:#ffd966; --gold-dim:#3d3100; --text:#f0ede8; --text-muted:#7a7670; --text-dim:#2e2e34; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; }
  .bg-glow { position:fixed; top:0; left:50%; transform:translateX(-50%); width:800px; height:300px; background:radial-gradient(ellipse,rgba(245,200,66,0.06) 0%,transparent 65%); pointer-events:none; z-index:0; }
  header { position:relative; z-index:10; padding:0 48px; height:68px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:rgba(12,12,14,0.94); backdrop-filter:blur(20px); }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-mark { width:32px; height:32px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-text { font-family:'DM Serif Display',serif; font-size:1.3rem; color:var(--text); }
  .logo-text em { color:var(--gold); font-style:normal; }
  .content { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:64px 24px 100px; }
  h1 { font-family:'DM Serif Display',serif; font-size:2.5rem; letter-spacing:-0.02em; margin-bottom:10px; line-height:1.1; }
  h1 em { color:var(--gold); font-style:italic; }
  .subtitle { color:var(--text-muted); font-size:0.95rem; margin-bottom:36px; line-height:1.7; }
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px; }
  .field { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
  label { font-size:0.7rem; font-weight:500; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; }
  input, textarea, select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:11px 14px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:all 0.2s; width:100%; }
  input:focus, textarea:focus { border-color:var(--gold-dim); background:rgba(245,200,66,0.03); }
  textarea { resize:vertical; min-height:100px; line-height:1.6; }
  select { cursor:pointer; appearance:none; }
  .submit-btn { width:100%; background:var(--gold); color:var(--bg); border:none; padding:14px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; border-radius:10px; margin-top:6px; transition:all 0.2s; }
  .submit-btn:hover { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 8px 24px rgba(245,200,66,0.25); }
  .success { display:none; margin-top:14px; padding:14px 18px; background:rgba(245,200,66,0.08); border-left:2px solid var(--gold); color:var(--gold); font-size:0.85rem; border-radius:0 8px 8px 0; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:28px 48px; display:flex; justify-content:space-between; }
  footer p, footer a { font-size:0.75rem; color:var(--text-dim); text-decoration:none; }
  footer a:hover { color:var(--gold); }
  @media(max-width:768px) { header{padding:0 20px} footer{flex-direction:column;gap:10px;padding:28px 20px} }
</style>
</head>
<body>
<div class="bg-glow"></div>
<header>
  <a href="index.html" class="logo">
    <div class="logo-mark">📄</div>
    <span class="logo-text">Resume<em>Snap</em></span>
  </a>
</header>
<div class="content">
  <h1>Get in <em>Touch</em></h1>
  <p class="subtitle">Want a new template? Found a bug? Have feedback? We read every message.</p>
  <div class="form-card">
    <div class="field"><label>Your Name</label><input type="text" id="name" placeholder="Jane Smith"></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="jane@example.com"></div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option>Request a new template</option>
        <option>PDF download issue</option>
        <option>Formatting problem</option>
        <option>Feature request</option>
        <option>General feedback</option>
        <option>Partnership / advertising</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field"><label>Message</label><textarea id="message" placeholder="Tell us more..."></textarea></div>
    <button class="submit-btn" onclick="handleSubmit()">Send Message →</button>
    <div class="success" id="successMsg">✓ Message sent! We'll get back to you within 2 business days.</div>
  </div>
</div>
<footer>
  <p>© 2025 ResumeSnap.net — Free CV builder</p>
  <div style="display:flex;gap:20px"><a href="privacy.html">Privacy</a><a href="about.html">About</a></div>
</footer>
<script>
function handleSubmit() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  if (!name || !email || !message) { alert('Please fill in all required fields.'); return; }
  document.getElementById('successMsg').style.display = 'block';
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true; btn.textContent = 'Sent ✓';
}
</script>
</body>
</html>
